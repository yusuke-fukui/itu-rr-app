name: Keep Alive

on:
  schedule:
    - cron: '0 */12 * * *'  # 12時間ごと
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Wake up Streamlit app
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright
          import time

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto("https://itu-rr-app.streamlit.app/", timeout=60000)
              time.sleep(5)

              print("Title:", page.title())
              print("URL:", page.url)

              # スリープ画面のボタンをクリック
              try:
                  btn = page.get_by_role("button", name="Yes, get this app back up!")
                  if btn.is_visible(timeout=8000):
                      print("Sleep button found, clicking...")
                      btn.click()
                      time.sleep(30)
                      print("Waited 30s after click")
                  else:
                      print("Sleep button not visible, app may already be awake")
              except Exception as e:
                  print("Button check error:", e)

              page.screenshot(path="screenshot.png")
              print("Screenshot saved")
              browser.close()
              print("Done")
          EOF

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshot
          path: screenshot.png
